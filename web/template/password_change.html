{{define "title"}}パスワード変更 - サンプルアプリ{{end}}

{{define "content"}}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">パスワード変更</h2>

    {{if .Error}}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{.Error}}
        </div>
    {{end}}

    {{if .Success}}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
            {{.Success}}
        </div>
    {{end}}

    <form action="/password_change" method="POST" class="space-y-4">
        <div>
            <label for="current_password" class="block text-sm font-medium text-gray-700">現在のパスワード</label>
            <input type="password" name="current_password" id="current_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>
        <div>
            <label for="new_password" class="block text-sm font-medium text-gray-700">新しいパスワード</label>
            <input type="password" name="new_password" id="new_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>
        <div>
            <label for="confirm_password" class="block text-sm font-medium text-gray-700">新しいパスワード（確認）</label>
            <input type="password" name="confirm_password" id="confirm_password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-2">
        </div>
        <div>
            <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                変更を保存
            </button>
        </div>
    </form>
</div>
{{end}}
