{{define "title"}}ホーム - サンプルアプリ{{end}}

{{define "content"}}
<div class="bg-white p-8 rounded-lg shadow-md max-w-md mx-auto text-center" x-data="{ count: 0 }">
    <h1 class="text-3xl font-bold mb-4 text-blue-600">Hello, {{.User.Name}}</h1>
    <p class="mb-6">ログインに成功しました！これは HTMX, Alpine.js, Tailwind CSS を使ったサンプルアプリケーションです。</p>

    <div class="mb-6 p-4 border border-gray-200 rounded">
        <p class="mb-2">Alpine.js カウンター: <span x-text="count" class="font-bold text-lg"></span></p>
        <button @click="count++" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
            カウントアップ
        </button>
    </div>
</div>
{{end}}
